services:
  db:
    image: mysql:8.4
    container_name: wordp-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
      MYSQL_USER: ${WORDPRESS_DB_USER}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    build:
      context: ./wordpress
    container_name: wordp-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG}
      CONTENT_PIPELINE_SHARED_SECRET: ${CONTENT_PIPELINE_SHARED_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
    ports:
      - "${WP_PORT}:80"
    volumes:
      - wordpress_data:/var/www/html

  autopost:
    profiles:
      - autopost
    build:
      context: ./autopost
    container_name: wordp-autopost
    restart: unless-stopped
    depends_on:
      wordpress:
        condition: service_started
    environment:
      AUTOPOST_ENABLED: ${AUTOPOST_ENABLED}
      AUTOPOST_RUN_ONCE: ${AUTOPOST_RUN_ONCE}
      AUTOPOST_STARTUP_DELAY_SECONDS: ${AUTOPOST_STARTUP_DELAY_SECONDS}
      AUTOPOST_MIN_WORDS: ${AUTOPOST_MIN_WORDS}
      AUTOPOST_MAX_WORDS: ${AUTOPOST_MAX_WORDS}
      WORDPRESS_URL: ${AUTOPOST_WORDPRESS_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      AUTOPOST_WORDPRESS_INTERNAL_URL: ${AUTOPOST_WORDPRESS_INTERNAL_URL}
      AUTOPOST_POLL_SECONDS: ${AUTOPOST_POLL_SECONDS}
      CONTENT_PIPELINE_SHARED_SECRET: ${CONTENT_PIPELINE_SHARED_SECRET}

volumes:
  db_data:
  wordpress_data:
